# Example: same host — Next.js marketing + Vite panel SPA.
# Adjust paths, SSL, and domain. Build outputs:
#   - Next:   apps/web/.next  → run `npm run start -w web` (or `next start` in apps/web) on port 3000
#   - Panel:  dist/           → static files from `npm run build:panel`
#
# Panel routes must fall back to index.html (SPA). Everything else goes to Next.

upstream viva_next {
    server 127.0.0.1:3000;
}

server {
    listen 443 ssl http2;
    server_name example.com;

    # ssl_certificate ...;
    # ssl_certificate_key ...;

    root /var/www/viva-panel/dist;
    index index.html;

    # Vite panel bundles (must not be proxied to Next)
    location ^~ /assets/ {
        try_files $uri =404;
    }

    location ^~ /_next/ {
        proxy_pass http://viva_next;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://viva_next;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /login {
        try_files $uri $uri/ /index.html;
    }
    location ^~ /register {
        try_files $uri $uri/ /index.html;
    }
    location ^~ /forgot-password {
        try_files $uri $uri/ /index.html;
    }
    location ^~ /auth/ {
        try_files $uri $uri/ /index.html;
    }
    location ^~ /dashboard {
        try_files $uri $uri/ /index.html;
    }
    location ^~ /admin {
        try_files $uri $uri/ /index.html;
    }
    location ^~ /instructor {
        try_files $uri $uri/ /index.html;
    }
}
