# Production-style images (code baked in). Use when you want nginx + Next standalone builds.
#
#   docker compose -f docker-compose.prod.yml up --build
#
# Ports (defaults):
#   Marketing (Next):  http://localhost:5173  → container listens on 3001 (see Dockerfile.web)
#   Panel (nginx):     http://localhost:3000
#   API:               http://localhost:3001/api/v1/health

services:
  db:
    image: mysql:8.0
    container_name: viva-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-viva_root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-viva}
    volumes:
      - viva_mysql_data:/var/lib/mysql
    ports:
      - "${MYSQL_PUBLISH_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: viva-backend
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3001/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 45s
    environment:
      EXPOSE_ERROR_DETAILS: ${EXPOSE_ERROR_DETAILS:-1}
      PORT: "3001"
      MYSQL_HOST: db
      MYSQL_PORT: "3306"
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-viva_root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-viva}
      DB_AUTO_SEED: ${DB_AUTO_SEED:-1}
      DB_SYNC_ALTER: ${DB_SYNC_ALTER:-0}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-docker-dev-change-me}
      # Set explicit domains in production (recommended). Fallback `*` prevents accidental domain lockout.
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      API_PUBLIC_URL: ${API_PUBLIC_URL:-http://localhost:3001}
      PANEL_DEFAULT_ORIGIN: ${PANEL_DEFAULT_ORIGIN:-http://localhost:3000}
      VPOS_ENABLED: ${VPOS_ENABLED:-0}
      VPOS_MODE: ${VPOS_MODE:-production}
      VPOS_TEST_MODE: ${VPOS_TEST_MODE:-0}
      VPOS_USERNAME: ${VPOS_USERNAME:-}
      VPOS_PASSWORD: ${VPOS_PASSWORD:-}
      VPOS_BINDING_USERNAME: ${VPOS_BINDING_USERNAME:-}
      VPOS_BINDING_PASSWORD: ${VPOS_BINDING_PASSWORD:-}
      VPOS_API_BASE_URL: ${VPOS_API_BASE_URL:-}
      VPOS_CURRENCY: ${VPOS_CURRENCY:-051}
    ports:
      - "${BACKEND_PUBLISH_PORT:-3001}:3001"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        # For same-origin deploys leave empty; for split domains set your marketing origin explicitly.
        VITE_MARKETING_ORIGIN: ${VITE_MARKETING_ORIGIN:-}
    container_name: viva-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PUBLISH_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy

  web:
    build:
      context: ./client
      dockerfile: Dockerfile.web
      args:
        # Provide your real domains in production to avoid localhost links in built assets.
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-}
        NEXT_PUBLIC_PANEL_URL: ${NEXT_PUBLIC_PANEL_URL:-}
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
    container_name: viva-web
    restart: unless-stopped
    ports:
      - "${WEB_PUBLISH_PORT:-5173}:3001"
    environment:
      INTERNAL_API_BASE_URL: http://backend:3001
    depends_on:
      backend:
        condition: service_healthy

volumes:
  viva_mysql_data:
