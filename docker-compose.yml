# Local dev: bind-mounted sources + Vite / Next / tsx watch (no image rebuild on code edits).
# Use `docker compose` as your normal login user (not sudo). With Docker Desktop, sudo often breaks
# credential helpers and leaves root-owned files under ~/.docker/buildx (e.g. "permission denied"
# on buildx/current). Fix once: sudo chown -R "$(whoami)" ~/.docker/buildx
#
#   docker compose up
#
# First start runs `npm ci` inside app containers (slower). After dependency changes, restart the
# affected service or run: docker compose build <service>
#
# Dev services use explicit `image:` names so they are not confused with older production images
# (e.g. nginx-based `frontend`). If you see "npm: not found", run: docker compose build --no-cache
#
# Production-style stack (baked images): docker compose -f docker-compose.prod.yml up --build
#
# Ports (defaults):
#   Marketing (Next apps/web):  http://localhost:5173
#   Panel / accounts (Vite):    http://localhost:3000  (host → container :5173; set PANEL_DEFAULT_ORIGIN accordingly)
#   API (Express):              http://localhost:3001/api/v1/health
#   Local API without Docker:   default `PANEL_DEFAULT_ORIGIN` is http://localhost:5173 (Vite dev server).

services:
  db:
    image: mysql:8.0
    container_name: viva-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-viva_root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-viva}
    volumes:
      - viva_mysql_data:/var/lib/mysql
    ports:
      - "${MYSQL_PUBLISH_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  backend:
    image: viva-dev-backend
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: viva-backend
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3001/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 90s
    environment:
      EXPOSE_ERROR_DETAILS: ${EXPOSE_ERROR_DETAILS:-1}
      NODE_ENV: development
      PORT: "3001"
      MYSQL_HOST: db
      MYSQL_PORT: "3306"
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-viva_root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-viva}
      DB_AUTO_SEED: ${DB_AUTO_SEED:-1}
      DB_SYNC_ALTER: ${DB_SYNC_ALTER:-0}
      # Set to 1 to run booking payment-window + hold-expiry jobs inside the API process (default off; use jobs:bookings in cron instead if you prefer).
      BOOKING_CRON_ENABLED: ${BOOKING_CRON_ENABLED:-0}
      BOOKING_CRON_INTERVAL_MS: ${BOOKING_CRON_INTERVAL_MS:-300000}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-docker-dev-change-me}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-docker-dev-refresh-change-me}
      API_PUBLIC_URL: ${API_PUBLIC_URL:-http://localhost:3001}
      PANEL_DEFAULT_ORIGIN: ${PANEL_DEFAULT_ORIGIN:-http://localhost:3000}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173,http://localhost:3001,http://127.0.0.1:3001}
    ports:
      - "${BACKEND_PUBLISH_PORT:-3001}:3001"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    command: ["sh", "-c", "npm ci && npm run dev"]
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: viva-dev-client
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    container_name: viva-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PUBLISH_PORT:-3000}:5173"
    environment:
      VITE_MARKETING_ORIGIN: ${VITE_MARKETING_ORIGIN:-http://localhost:5173}
      VITE_API_PROXY_TARGET: http://backend:3001
    volumes:
      - ./client:/app
      # Separate from `web` so two `npm install` processes never clobber the same tree.
      - client_panel_node_modules:/app/node_modules
    # Clear volume children (cannot rm mount root) then install — fixes broken symlinks / partial installs.
    command:
      [
        "sh",
        "-c",
        "find node_modules -mindepth 1 -maxdepth 1 -exec rm -rf {} + 2>/dev/null || true; npm install && npm run dev -- --host 0.0.0.0",
      ]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:5173').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 180s
    depends_on:
      backend:
        condition: service_healthy

  web:
    image: viva-dev-client
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    container_name: viva-web
    restart: unless-stopped
    ports:
      - "${WEB_PUBLISH_PORT:-5173}:5173"
    environment:
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:5173}
      NEXT_PUBLIC_PANEL_URL: ${NEXT_PUBLIC_PANEL_URL:-http://localhost:3000}
      # Browser → API (host port). Server components in this container use INTERNAL_API_BASE_URL.
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3001}
      INTERNAL_API_BASE_URL: http://backend:3001
      NODE_ENV: development
    volumes:
      - ./client:/app
      - client_web_node_modules:/app/node_modules
    command:
      [
        "sh",
        "-c",
        "find node_modules -mindepth 1 -maxdepth 1 -exec rm -rf {} + 2>/dev/null || true; npm install && npm run dev -w web -- --hostname 0.0.0.0 --port 5173",
      ]
    depends_on:
      backend:
        condition: service_healthy

volumes:
  viva_mysql_data:
  backend_node_modules:
  client_panel_node_modules:
  client_web_node_modules:
